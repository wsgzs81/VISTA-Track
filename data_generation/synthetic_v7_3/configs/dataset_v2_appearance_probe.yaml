dataset:
  name: SynMVTrack
  version: v2_appearance_probe
  num_sequences: 2
  frames_per_sequence: 16
  frames_per_sequence_choices: [16]
  fps: 30
  views_choices:
    4: 1.0

render:
  resolution: [640, 480]
  resolution_choices:
    - [640, 480]
  samples: 8
  samples_choices: [8]
  save_rgb: true
  save_mask: true
  save_depth: false
  image_format: jpg
  mask_format: png

assets:
  target_index: assets/index/target_index.json
  scene_index: assets/index/scene_index.json
  material_index: assets/index/material_index.json
  hdri_index: assets/index/hdri_index.json
  min_target_assets: 300
  min_scene_assets: 100

camera:
  height_range_m: [0.5, 2.2]
  distance_range_m: [1.5, 4.0]
  fov_range_deg: [45, 90]
  elevation_range_deg: [-25, 5]
  require_min_visible_views: 4

trajectory:
  types:
    smooth_curve: 0.25
    abrupt_turn: 0.10
    stop_and_go: 0.10
    leave_and_return: 0.15
    depth_motion: 0.10
    rotation_heavy: 0.10
    occluder_crossing: 0.15
    distractor_crossing: 0.05

attributes:
  main_challenge_distribution:
    POC: 0.20
    FOC: 0.15
    OV: 0.15
    BC: 0.15
    MB: 0.10
    SV: 0.10
    LR: 0.05
    ARC: 0.05
    DEF: 0.05

split:
  train: 1
  val: 1
  test: 0
  test_challenge_bias: [FOC, OV, BC]
