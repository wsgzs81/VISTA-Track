dataset:
  name: VISTA-MV-SOT-ICLR-Pilot-v1
  version: "0.1"
  seed: 20260622
  fps: 30
  frames_per_sequence: 96
  num_sequences: 24
  num_cameras_min: 4
  num_cameras_max: 6
  resolution:
    width: 1280
    height: 720
  design_goal: uncalibrated fixed-camera multi-view SOT with real-object colors, target motion, occlusion, distractors, and challenge labels

protocol:
  public_name: VISTA-MV-SOT
  setting: uncalibrated_multiview_single_object_tracking
  expose_calibration_to_methods: false
  expose_modal_bbox: true
  expose_visibility: true
  expose_masks_optional: true

visibility:
  min_visible_cameras: 2
  min_cameras_with_occlusion: 1
  max_consecutive_invisible: 24
  min_visibility_ratio: 0.05

split:
  train: 0.8
  val: 0.1
  test: 0.1
  split_by_asset: true

output:
  root: /workspace/home/zhangboqiang/mvtrack_gen/output_iclr_uncalib_pilot_v1_20260622
  image_format: png
  depth_format: png
  mask_format: png
  annotation_format: json
  shard_size_sequences: 50

targets:
  selection_mode: sequential
  categories:
    - name: Television_01
      mesh: /Game/Assets/Realistic/Television_01/model
      scale_range_m: [0.60, 1.15]
      ground_z_cm: 0.0
      motion_type: occlusion_crossing
    - name: wicker_basket_01
      mesh: /Game/Assets/Realistic/wicker_basket_01/model
      scale_range_m: [0.35, 0.80]
      ground_z_cm: 0.0
      motion_type: stop_go_zigzag
    - name: painted_wooden_cabinet_02
      mesh: /Game/Assets/Realistic/painted_wooden_cabinet_02/model
      scale_range_m: [0.55, 1.05]
      ground_z_cm: 0.0
      motion_type: depth_scale_sweep
    - name: coffee_table_round_01
      mesh: /Game/Assets/Realistic/coffee_table_round_01/model
      scale_range_m: [0.45, 0.95]
      ground_z_cm: 0.0
      motion_type: crossing_sine
    - name: small_wooden_table_01
      mesh: /Game/Assets/Realistic/small_wooden_table_01/model
      scale_range_m: [0.45, 0.95]
      ground_z_cm: 0.0
      motion_type: occlusion_loop
    - name: chinese_stool
      mesh: /Game/Assets/Realistic/chinese_stool/model
      scale_range_m: [0.35, 0.85]
      ground_z_cm: 0.0
      motion_type: stop_go_zigzag

occluders:
  enabled: true
  count_range: [3, 6]
  policy: view_specific_partial_occlusion_with_near_target_clutter
  categories:
    - name: view_specific_pillar
      mesh: builtin_cylinder
      placement: between_selected_camera_and_target
    - name: view_specific_panel
      mesh: builtin_cube
      placement: between_selected_camera_and_target
    - name: near_target_clutter
      mesh: builtin_cube
      placement: near_target

distractors:
  enabled: true
  similar_target_like_range: [1, 3]
  background_furniture_range: [6, 12]
  purpose: identity-preserving tracking under similar-shape clutter

rendering:
  engine: ue5_vulkan
  lighting: per-sequence synchronized randomized indoor lighting
  sim2real_effects:
    - cast_shadows
    - fog_density_jitter
    - focal_length_jitter
    - viewpoint_baseline_jitter
    - material_palette_jitter

quality_gate:
  min_first_visible_views: 2
  min_sequence_mean_visibility: 0.15
  max_invisible_annotation_fraction: 0.35
  max_bbox_bad_ratio: 0.05
  min_mean_motion_px: 4.0
  require_occlusion: true
  reject_reason: do_not_train_or_publish_sequences_that_fail_this_gate

training_notes:
  stage_use: second-stage uncalibrated multi-view fusion training after real single-view pretraining
  avoid: do not replace GOT/LaSOT/TrackingNet first-stage data with synthetic data until real validation improves
