occluders:
  enabled: true
  count_range:
  - 4
  - 8
  policy: view_specific_plus_near_target_clutter
  categories:
  - name: view_specific_pillar
    mesh: builtin_cylinder
    placement: between_selected_camera_and_target
  - name: view_specific_panel
    mesh: builtin_cube
    placement: between_selected_camera_and_target
  - name: near_target_clutter
    mesh: builtin_cube
    placement: near_target
distractors:
  enabled: true
  similar_target_like_range:
  - 2
  - 5
  background_furniture_range:
  - 5
  - 11
  purpose: identity-preserving tracking under same-class/similar-shape clutter
rendering:
  engine: ue5_vulkan
  lighting: per-sequence synchronized randomized indoor lighting
  sim2real_effects:
  - cast_shadows
  - fog_density_jitter
  - focal_length_jitter
  - viewpoint_baseline_jitter
training_notes:
  stage_use: Use as second-stage hard multi-view fusion data after real single-view
    pretraining.
  avoid: Do not replace real first-stage tracking data with this synthetic set until
    GMOT/GMTD/GOT-like validation improves.
