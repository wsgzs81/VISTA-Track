dataset:
  name: MVTrackSynth-Hard-v1
  version: '1.0'
  seed: 20260616
  fps: 30
  frames_per_sequence: 90
  num_sequences: 12
  num_cameras_min: 4
  num_cameras_max: 6
  resolution:
    width: 1280
    height: 720
  design_goal: 'multi-view single-object tracking hard cases: cross-view identity,
    occlusion, distractors, scale/viewpoint variation'
visibility:
  min_visible_cameras: 2
  min_cameras_with_occlusion: 1
  max_consecutive_invisible: 45
  min_visibility_ratio: 0.03
split:
  train: 0.8
  val: 0.1
  test: 0.1
  split_by_asset: true
output:
  root: output_hard_v1_preview_20260616
  image_format: png
  depth_format: png
  mask_format: png
  annotation_format: json
  shard_size_sequences: 50
