dataset:
  name: MVTrackSynth-GroundScan-Wicker
  version: 0.1
  seed: 20260615
  fps: 30
  frames_per_sequence: 1
  num_sequences: 6
  num_cameras_min: 4
  num_cameras_max: 4
  resolution:
    width: 1280
    height: 720

visibility:
  min_visible_cameras: 4
  min_cameras_with_occlusion: 0
  max_consecutive_invisible: 30
  min_visibility_ratio: 0.05

split:
  train: 0.8
  val: 0.1
  test: 0.1
  split_by_asset: true

output:
  root: output_groundscan_wicker_20260615
  image_format: png
  depth_format: png
  mask_format: png
  annotation_format: json
  shard_size_sequences: 50

targets:
  selection_mode: sequential
  categories:
    - name: wicker_basket_01_z_m40
      mesh: /Game/Assets/Realistic/wicker_basket_01/model
      ground_z_cm: -40.0
      scale_range_m: [0.41, 0.41]
      motion_type: controlled_orbit
    - name: wicker_basket_01_z_m30
      mesh: /Game/Assets/Realistic/wicker_basket_01/model
      ground_z_cm: -30.0
      scale_range_m: [0.41, 0.41]
      motion_type: controlled_orbit
    - name: wicker_basket_01_z_m20
      mesh: /Game/Assets/Realistic/wicker_basket_01/model
      ground_z_cm: -20.0
      scale_range_m: [0.41, 0.41]
      motion_type: controlled_orbit
    - name: wicker_basket_01_z_m10
      mesh: /Game/Assets/Realistic/wicker_basket_01/model
      ground_z_cm: -10.0
      scale_range_m: [0.41, 0.41]
      motion_type: controlled_orbit
    - name: wicker_basket_01_z_0
      mesh: /Game/Assets/Realistic/wicker_basket_01/model
      ground_z_cm: 0.0
      scale_range_m: [0.41, 0.41]
      motion_type: controlled_orbit
    - name: wicker_basket_01_z_10
      mesh: /Game/Assets/Realistic/wicker_basket_01/model
      ground_z_cm: 10.0
      scale_range_m: [0.41, 0.41]
      motion_type: controlled_orbit
  num_per_sequence: 1

occluders:
  enabled: true
  count_range: [1, 1]
  categories:
    - name: small_pillar
      mesh: builtin_cylinder
      scale_range_m: [0.15, 0.45]
      placement: partial_between_camera_and_target

physics:
  gravity: -9.81
  settlement_time_s: 0.2
  settlement_linear_vel_threshold: 0.02
  settlement_angular_vel_threshold: 2.0
  max_settlement_attempts: 1
  penetration_check_enabled: true

motion:
  default_type: controlled_orbit
  impulse_force_range: [0.5, 1.0]
  trajectory_radius_m: 0.8
  bounce_enabled: false
  friction_range: [0.3, 0.8]
  restitution_range: [0.2, 0.7]
