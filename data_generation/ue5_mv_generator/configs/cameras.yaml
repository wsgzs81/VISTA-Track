cameras:
  placement:
    mode: hemisphere_uniform
    radius_min_m: 4.0
    radius_max_m: 10.0
    height_min_m: 0.5
    height_max_m: 5.0
    yaw_coverage_deg: 360
    pitch_min_deg: -15
    pitch_max_deg: 40
    # Guarantee: cameras are spread to cover different azimuths
    min_azimuth_separation_deg: 60

  lens:
    focal_length_mm_min: 24
    focal_length_mm_max: 50
    sensor_width_mm: 36.0
    sensor_height_mm: 20.25
    focus_tracking: true
    dof_enabled: false

  sync:
    strict_same_frame_index: true
    save_timestamp: true
    # All cameras render same world state per frame
    freeze_world_between_cameras: true

  # Occlusion camera strategy:
  # At least one camera is placed behind known occluders
  occlusion_strategy:
    enabled: true
    min_occluded_cameras: 1
    max_occluded_cameras: 2
    occlusion_placement: behind_random_occluder
