DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN: [0.485, 0.456, 0.406]
  STD: [0.229, 0.224, 0.225]
  SEARCH:
    CENTER_JITTER: 4.5
    FACTOR: 5.0
    SCALE_JITTER: 0.5
    SIZE: 364
    NUMBER: 2
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 182
    NUMBER: 1
  TRAIN:
    DATASETS_NAME: [GOT10K_train_full, LASOT, TRACKINGNET]
    DATASETS_SAMPLER: sot
    DATASETS_RATIO: [4, 2, 3]
    SAMPLE_PER_EPOCH: 60000
  VAL:
    DATASETS_NAME: [GOT10K_votval]
    DATASETS_RATIO: [1]
    SAMPLE_PER_EPOCH: 5000

MODEL:
  PRETRAIN_FILE: "dinov2_vitb14_pretrain.pth"
  RETURN_INTER: false
  BACKBONE:
    TYPE: vit_base_patch14_518_dinov2
    STRIDE: 14
    ADD_CLS_TOKEN: true
    ATTN_TYPE: concat
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256

TRAIN:
  BBOX_TASK: true
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  BATCH_SIZE: 16
  NUM_WORKER: 2
  EPOCH: 80
  LR_DROP_EPOCH: 60
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  GRAD_CLIP_NORM: 0.1
  LR: 0.0001
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 200
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 5
  WEIGHT_DECAY: 0.0001
  AMP: false

TEST:
  EPOCH: 80
  SEARCH_FACTOR: 5.0
  SEARCH_SIZE: 364
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 182
  TEMPLATE_NUMBER: 3
  MEMORY_THRESHOLD: 1000
  DYNAMIC_TEMPLATE: true
  DYNAMIC_TEMPLATE_SCORE: 0.55
  DYNAMIC_TEMPLATE_INTERVAL: 5
  DYNAMIC_TEMPLATE_MAX: 2
